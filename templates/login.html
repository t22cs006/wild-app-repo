{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}

<div class="card" style="max-width: 350px; margin: 0 auto;">

    <h2 style="text-align:center; margin-bottom: 20px;">ログイン</h2>

    {% if form.errors %}
        <p style="color: red; text-align:center;">
            ユーザー名またはパスワードが違います。
        </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 15px;">
            <label for="id_username">ユーザー名</label><br>
            {{ form.username }}
        </div>

        <div style="margin-bottom: 20px;">
            <label for="id_password">パスワード</label><br>
            {{ form.password }}
        </div>

        <button type="submit" class="btn" style="width: 100%;">ログイン</button>
    </form>

</div>

{% endblock %}
