{% extends "base.html" %}

{% block title %}My Collection Map{% endblock %}

{% block extra_head %}
{{ block.super }}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    #map {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 10px;
    }

    /* 達成率ゲージ */
    .progress-bar {
        width: 100%;
        height: 18px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
    }
    .progress-fill {
        height: 100%;
        background: #4caf50;
        width: 0%;
        transition: width 0.6s ease;
    }

    .btn-area button {
        padding: 8px 16px;
        margin: 5px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-area button:hover,
    .btn-area button.active {
        background: #3e8e41;
    }
</style>
{% endblock %}

{% block content %}

<h2 class="section-title">My Collection Map</h2>

<div class="card">

    <div class="btn-area" style="margin-bottom: 20px;">
        <a href="/collectionmap/mycollection/?mode=explore" class="btn">統合ビューで開く</a>
    </div>
</div>

{% endblock %}
